version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: php_app
    volumes:
      - ./:/var/www
    networks:
      - app_network
    depends_on:
      - mysql

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx_app
    ports:
      - "8000:80" # Host port 8000 mapped to container port 80
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    ports:
      - "33061:3306" # Host port 33061 mapped to container port 3306 (to avoid conflict if local MySQL is running)
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  node:
    image: node:20
    container_name: node_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: tail -f /dev/null # Keep container running, or use 'npm run dev' if preferred
    networks:
      - app_network

volumes:
  mysql_data:
    driver: local

networks:
  app_network:
    driver: bridge
